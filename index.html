<!-- ========================================================
       API (inline — ไม่ต้องพึ่งไฟล์ภายนอก)
       ======================================================== -->
  <script>
  const API = {
    BASE_URL: 'https://script.google.com/macros/s/AKfycbxypGlbJfSzrHgqMB4GRjin6E80glV9Q6AckgzuRhSN9pcz1BlQlJfiVZMy7yfixwi2sg/exec',

    // ── GET via fetch (echo URL มี Access-Control-Allow-Origin: * จึงไม่ต้องใช้ JSONP) ──
    async _get(params) {
      const qs  = new URLSearchParams(params).toString();
      const res = await fetch(this.BASE_URL + '?' + qs, { redirect: 'follow' });
      if (!res.ok) throw new Error('เชื่อมต่อ server ไม่ได้ (HTTP ' + res.status + ')');
      const data = await res.json();
      if (data && data.success === false) {
        throw new Error(data.error || data.message || 'เกิดข้อผิดพลาด');
      }
      return data && data.data !== undefined ? data.data : data;
    },

    // ── POST via fetch ──
    async _post(action, body) {
      body = body || {};
      const res = await fetch(this.BASE_URL, {
        method:   'POST',
        headers:  { 'Content-Type': 'text/plain' },
        body:     JSON.stringify(Object.assign({ action: action }, body)),
        redirect: 'follow'
      });
      if (!res.ok) throw new Error('เชื่อมต่อ server ไม่ได้ (HTTP ' + res.status + ')');
      const json = await res.json();
      if (!json.success) throw new Error(json.error || json.message || 'เกิดข้อผิดพลาด');
      return json.data !== undefined ? json.data : json;
    },

    login:     function(email, password) { return API._get({ action: 'login', email: email, password: password }); },
    verifyOTP: function(email, otp)      { return API._get({ action: 'verifyOTP', email: email, otp: otp }); },
    register:  function(userData)        { return API._post('register', { userData: userData }); }
  };
  </script>

<!-- ========================================================
     LOGIN LOGIC
     ======================================================== -->
<script>
  document.addEventListener('DOMContentLoaded', function(){
    try {
      var savedEmail = localStorage.getItem('wk_email');
      var savedPass  = localStorage.getItem('wk_pass');
      if (localStorage.getItem('wk_remember') === '1' && savedEmail) {
        document.getElementById('email').value    = savedEmail;
        document.getElementById('password').value = savedPass || '';
        document.getElementById('remember-me').checked = true;
      }
    } catch(e) {}

    document.getElementById('password').addEventListener('keyup', function(e){
      if (e.key === 'Enter') doLogin();
    });
    document.getElementById('email').addEventListener('keyup', function(e){
      if (e.key === 'Enter') document.getElementById('password').focus();
    });
  });

  function togglePass(){
    var el  = document.getElementById('password');
    var eye = document.getElementById('toggle-eye');
    if (el.type === 'password') {
      el.type = 'text';
      eye.className = 'bi bi-eye-slash toggle-eye';
    } else {
      el.type = 'password';
      eye.className = 'bi bi-eye toggle-eye';
    }
  }

  async function doLogin(){
    var email = document.getElementById('email').value.trim();
    var pass  = document.getElementById('password').value;
    var msg   = document.getElementById('msg');
    var btn   = document.getElementById('btn-login');
    var rem   = document.getElementById('remember-me').checked;

    if (!email || !pass) {
      msg.innerHTML = '<span class="text-danger">กรุณากรอกอีเมลและรหัสผ่าน</span>';
      return;
    }

    msg.innerHTML = '<span class="text-primary"><span class="spinner-border spinner-border-sm"></span> กำลังตรวจสอบ...</span>';
    btn.disabled  = true;

    try {
      var res = await API.login(email, pass);

      // res อาจมีรูปแบบ { success, message, role } หรือ { success, data: { ... } }
      var success = res.success !== undefined ? res.success : true;
      var role    = res.role || (res.data && res.data.role) || 'Member';
      var errMsg  = res.message || (res.data && res.data.message) || 'ข้อมูลไม่ถูกต้อง';

      if (success) {
        try {
          if (rem) {
            localStorage.setItem('wk_email',    email);
            localStorage.setItem('wk_pass',     pass);
            localStorage.setItem('wk_remember', '1');
          } else {
            localStorage.removeItem('wk_email');
            localStorage.removeItem('wk_pass');
            localStorage.removeItem('wk_remember');
          }
        } catch(e) {}

        msg.innerHTML = '<span class="text-success"><i class="bi bi-check-circle me-1"></i>เข้าสู่ระบบสำเร็จ กำลังนำไป...</span>';
        setTimeout(function(){
          window.location.href = 'dashboard.html?role=' + encodeURIComponent(role);
        }, 400);
      } else {
        msg.innerHTML = '<span class="text-danger"><i class="bi bi-x-circle me-1"></i>' + errMsg + '</span>';
        btn.disabled  = false;
      }
    } catch(err) {
      msg.innerHTML = '<span class="text-danger"><i class="bi bi-x-circle me-1"></i>' + err.message + '</span>';
      btn.disabled  = false;
    }
  }
</script>

</body>
</html>
